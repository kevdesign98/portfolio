<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Gateway | Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Syne:wght@800&display=swap"

<body>

    <canvas id="particle-canvas"></canvas>
    <div id="warp-veil"></div>

    <div id="loader">

            style="font-family: 'Orbitron'; color: var(--blue); letter-spacing: 5px; font-size: 0.8rem;">LOADING

        <div class="progress-container">
            <div id="progress-bar"></div>

    <div id="hero-intro">

    </div>

   <main id="main-content" class="container">
    <div class="row mb-5 justify-content-center">
        <div class="col-12 text-center">
            <h1 class="display-4 fw-bold" style="letter-spacing: -2px;">Select <span class="text-secondary">Environment</span></h1>
            <p class="node-id">Available Nodes: 02 // Status: Ready</p>
        </div>
    </div>

    <div class="row justify-content-center g-5">
        <div class="col-11 col-md-5">
            <a href="https://kevdesign98.github.io/portfolio/webgl.html" class="portal-card">
                <div class="arch">
                    <div class="tech-icon mb-4">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                             <circle cx="12" cy="12" r="10"></circle>
                             <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                             <path d="M2 12h20"></path>

                    </div>
                    <div>
                        <span class="node-id">01 / Creative</span>
                        <h2 class="portal-name mt-2">Immersive Lab</h2>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-11 col-md-5">
            <a href="https://kevdesign98.github.io/portfolio-html/home.html" class="portal-card">
                <div class="arch">
                    <div class="tech-icon mb-4">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="9" y1="21" x2="9" y2="9"></line>
                        </svg>
                    </div>
                    <div>
                        <span class="node-id">02 / Documentation</span>
                        <h2 class="portal-name mt-2">Static Archive</h2>
                    </div>
                </div>
            </a>
        </div>
    </div>
</main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="test.script.js"></script>
